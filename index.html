<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sandy — falling sand</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { display: block; image-rendering: pixelated; outline: none; }
  </style>
  <!-- Trunk builds the crate's cdylib and injects the wasm loader here.
       data-target-name selects the `sandy` library artifact (the desktop
       binary is `sandy-desktop`), so the wasm build is unambiguous. -->
  <link data-trunk rel="rust" data-target-name="sandy" data-wasm-opt="z" />
</head>
<body></body>
</html>
