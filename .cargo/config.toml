# getrandom 0.3 requires this cfg flag to select the JS/browser backend on
# wasm32-unknown-unknown (in addition to enabling its `wasm_js` feature in
# Cargo.toml). See https://docs.rs/getrandom/0.3.4/#webassembly-support
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
